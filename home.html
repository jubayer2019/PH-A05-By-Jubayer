<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind + DaisyUI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Font-Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Geist", sans-serif;
            
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <!-- Navigation -->
     <nav class="bg-white border-b border-base-300">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
        
        <div class="flex items-center gap-3">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-9 h-9">
            <h1 class="text-2xl font-bold text-slate-800">GitHub Issues Tracker</h1>
        </div>

        <div class="flex items-center gap-3">
            <label class="input w-80 flex items-center gap-2">
            <svg class="h-4 w-4 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" fill="none"></circle>
                <line x1="21" y1="21" x2="16.7" y2="16.7" stroke="currentColor" stroke-width="2"></line>
            </svg>
            <input type="search" class="grow" placeholder="Search issues..." />
            </label>

            <button class="btn btn-primary">
            <span class="text-lg">+</span>
            New Issue
            </button>
        </div>

        </div>
    </nav>

    <!-- Main Content -->
    <section class="container mx-auto px-6 py-8">
        <!-- Filter Section -->
        <div class="max-w-[90%] bg-white rounded-md shadow mx-auto px-6 py-4 flex items-center gap-4">
            <button onclick="toggleStyle('all-filter-btn')" id="all-filter-btn" class="btn filter-btn bg-[#FFFFFF] border-[#E4E4E7] text-[#64748B]">All</button>
            <button onclick="toggleStyle('open-filter-btn')" id="open-filter-btn" class="btn filter-btn bg-[#FFFFFF] border-[#E4E4E7] text-[#64748B]">Open</button>
            <button onclick="toggleStyle('closed-filter-btn')" id="closed-filter-btn" class="btn filter-btn bg-[#FFFFFF] border-[#E4E4E7] text-[#64748B]">Closed</button>
        </div>

        <!-- Issues Counter -->
        <div class="max-w-[90%] bg-white rounded-md shadow mx-auto px-6 py-4 flex justify-between items-center mt-6">
            <div class="flex justify-center items-center gap-2">
                <div class="bg-purple-300 h-[50%] rounded-full p-2"><img src="./assets/Aperture.png" alt=""></div>
                <div id="TotalIssue">

                </div>
            </div>
            <div class="flex justify-center items-center gap-3">
                <div class="flex justify-center items-center gap-1">
                    <div class="bg-green-500 h-3 w-3 rounded-full"></div>
                    <p class="font-semibold text-[#1F2937]">Open</p>
                </div>
                
                <div class="flex justify-center items-center gap-1">
                    <div class="bg-purple-500 h-3 w-3 rounded-full"></div>
                    <p class="font-semibold text-[#1F2937]">Closed</p>
                </div>
            </div>
        </div>
        <!-- Issues List -->

        <section id="loadingSpinner" class="flex justify-center items-center p-10 hidden">
            <span class="loading loading-spinner loading-xl"></span>
        </section>

        <div class="max-w-[90%] bg-white rounded-md shadow mx-auto px-6 py-4 mt-6">
            
            <!-- Dynamic Issue Cards -->
            <div class="cardContainer ">
                <div id="issueCard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

                </div>
                
            </div>

            <!-- Dynamic Modal -->
            <dialog id="text_modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="modal_container">
                </div>
                <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
                </div>
            </div>
            </dialog>

        </div>
    </section>    
        
    
<script src="./script.js"></script>
</body>
</html>
