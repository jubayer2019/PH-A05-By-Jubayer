<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Log In</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind + DaisyUI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        *{
            font-family: "Geist", sans-serif;
            
        }
    </style>
    
</head>
<body class="max-w[1600px] mx-auto">
    <section class="grid place-items-center min-h-screen bg-gray-100 p-8">
    <div class="w-[520px] bg-white flex flex-col items-center p-8 shadow-[0_10px_25px_rgba(0,0,0,0.08)] rounded-xl">
    
    <div class="flex flex-col justify-center items-center mb-6">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="mb-6 w-20" />
      <h1 class="font-semibold text-[#1F2937] text-[24px]">GitHub Issues Tracker</h1>
      <p class="text-[#64748B] text-[16px]">Sign in to manage your issues</p>
    </div>

    <form class="w-full">
      <div class="mb-4">
        <label class="block font-bold text-[#1F2937] text-[16px] mb-2">Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter Username"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-100 focus:border-gray-200 transition"
        />
        <p class="text-[#4A00FF] text-[14px] mt-2">Default: admin</p>
      </div>

      <div class="mb-6">
        <label class="block font-bold text-[#1F2937] text-[16px] mb-2">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter Password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-100 focus:border-gray-200 transition"
        />
        <p class="text-[#4A00FF] text-[14px] mt-2">Default: admin123</p>
      </div>

      <button id="signinBtn" class="w-full bg-[#4A00FF] hover:bg-[#3d00d6] text-white font-semibold py-3 rounded-lg transition mb-4">
        Sign In
      </button>
    </form>

    <!-- Or  -->
     <div class="flex justify-center items-center gap-3 w-full py-6">
      <hr class="border border-[#E4E4E7] w-[50%]">
      <p>OR</p>
      <hr class="border border-[#E4E4E7] w-[50%]">
     </div>

     <!-- Demo Credentials: -->

     <div class="text-center">
      <p class="text-[14px] text-[#64748B] mb-2">Demo Credentials:</p>
      <div class="py-6">
        <p><span class="font-bold">Username:</span> admin
        <br><span class="font-bold">Password:</span> admin123</p>
      </div>
     </div>

  </div>
</section>


<script src="./script.js"></script>
</body>
</html>
